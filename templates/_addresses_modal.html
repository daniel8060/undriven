<style>
  .addr-modal-add-row {
    display: grid;
    grid-template-columns: 130px 1fr auto;
    gap: .65rem;
    align-items: end;
    margin-bottom: 1.5rem;
    padding-bottom: 1.25rem;
    border-bottom: 1px solid var(--border);
  }
</style>

<div class="modal-backdrop" id="addrModalBackdrop">
  <div class="modal" role="dialog" aria-modal="true" aria-label="My Addresses">

    <div class="modal-header">
      <h2>My Addresses</h2>
      <button class="modal-close" id="addrModalClose" aria-label="Close">✕</button>
    </div>

    <div class="modal-body">
      <div id="addr-modal-flash"></div>

      <!-- Add address -->
      <form id="add-addr-form">
        <div class="addr-modal-add-row">
          <div class="form-field">
            <label for="new-addr-label">Label</label>
            <input id="new-addr-label" type="text" placeholder="Home" required>
          </div>
          <div class="form-field">
            <label for="new-addr-address">Address</label>
            <input id="new-addr-address" type="text" placeholder="123 Main St, City" required>
          </div>
          <button type="submit" class="btn-add">Add</button>
        </div>
      </form>

      <!-- Addresses table -->
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th style="width:1.5rem"></th>
              <th style="width:110px">Label</th>
              <th>Address</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="addr-tbody">
            {% for addr in user_addresses %}
            <tr data-id="{{ addr.id }}"
                data-label="{{ addr.label }}"
                data-address="{{ addr.address }}">
              <td class="drag-handle" title="Drag to reorder">⠿</td>
              <td class="addr-label" style="font-weight:500;font-size:.84rem">{{ addr.label }}</td>
              <td class="addr-address" style="color:var(--muted);font-size:.84rem">{{ addr.address }}</td>
              <td style="display:flex;gap:.4rem;justify-content:flex-end">
                <button class="btn-edit">Edit</button>
                <button class="btn-delete">Delete</button>
              </td>
            </tr>
            {% endfor %}
          </tbody>
        </table>
        <div class="cars-empty-state" id="addr-empty"{% if user_addresses %} style="display:none"{% endif %}>
          No saved addresses yet. Add one above.
        </div>
      </div>
    </div><!-- /.modal-body -->

  </div><!-- /.modal -->
</div><!-- /.modal-backdrop -->
