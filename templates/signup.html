<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up — Undriven</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <style>
    .login-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }
    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow-lg);
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 360px;
    }
    .login-card h1 { font-size: 1.4rem; font-weight: 600; margin-bottom: .25rem; }
    .login-card p  { font-size: .85rem; color: var(--muted); margin-bottom: 2rem; }
    .login-card .form-field { margin-bottom: 1rem; }
    .login-card label {
      display: block;
      font-size: .8rem;
      font-weight: 500;
      color: var(--muted);
      margin-bottom: .35rem;
      text-transform: uppercase;
      letter-spacing: .04em;
    }
    .login-card input[type="text"],
    .login-card input[type="password"] {
      width: 100%;
      padding: .6rem .75rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface-alt);
      font-family: var(--sans);
      font-size: .95rem;
      color: var(--text);
      outline: none;
      transition: border-color .15s;
    }
    .login-card input:focus { border-color: var(--accent); }
    .btn-signin {
      width: 100%;
      margin-top: .5rem;
      padding: .65rem;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-family: var(--sans);
      font-size: .95rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .15s;
    }
    .btn-signin:hover { opacity: .88; }
    .login-error {
      margin-bottom: 1rem;
      padding: .6rem .75rem;
      background: var(--danger-lt);
      border: 1px solid var(--danger);
      border-radius: 8px;
      font-size: .85rem;
      color: var(--danger);
    }
    .login-footer {
      margin-top: 1.25rem;
      text-align: center;
      font-size: .82rem;
      color: var(--muted);
    }
    .login-footer a { color: var(--accent); }
  </style>
</head>
<body>
<div class="login-wrap">
  <div class="login-card">
    <h1>Undriven</h1>
    <p>Create an account</p>

    {% if error %}
      <div class="login-error">{{ error }}</div>
    {% endif %}

    <form method="POST" action="{{ url_for('signup') }}">
      <div class="form-field">
        <label for="username">Username</label>
        <input type="text" id="username" name="username"
               value="{{ username or '' }}" autocomplete="username" required autofocus>
      </div>

      <div class="form-field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password"
               autocomplete="new-password" required>
      </div>

      <div class="form-field">
        <label for="password2">Confirm password</label>
        <input type="password" id="password2" name="password2"
               autocomplete="new-password" required>
      </div>

      <button type="submit" class="btn-signin">Create account</button>
    </form>

    <div class="login-footer">
      Already have an account? <a href="{{ url_for('login') }}">Sign in</a>
    </div>
  </div>
</div>
</body>
</html>
