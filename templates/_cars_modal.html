<style>
  .btn-add {
    font-family: var(--sans);
    font-size: .85rem;
    font-weight: 500;
    padding: .45rem 1rem;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    white-space: nowrap;
    transition: opacity .15s;
  }
  .btn-add:hover { opacity: .88; }

  .btn-edit, .btn-save {
    font-family: var(--sans);
    font-size: .78rem;
    padding: .25rem .6rem;
    background: none;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--muted);
    cursor: pointer;
    transition: color .15s, border-color .15s;
    white-space: nowrap;
  }
  .btn-edit:hover  { color: var(--accent); border-color: var(--accent); }
  .btn-save        { color: var(--accent); border-color: var(--accent); }
  .btn-save:hover  { background: var(--accent-lt); }

  .btn-cancel {
    font-family: var(--sans);
    font-size: .78rem;
    padding: .25rem .6rem;
    background: none;
    border: 1px solid transparent;
    border-radius: 6px;
    color: var(--muted);
    cursor: pointer;
  }
  .btn-cancel:hover { color: var(--text); }

  .btn-delete {
    font-family: var(--sans);
    font-size: .78rem;
    padding: .25rem .6rem;
    background: none;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--muted);
    cursor: pointer;
    transition: color .15s, border-color .15s, background .15s;
    white-space: nowrap;
  }
  .btn-delete:hover { color: var(--danger); border-color: var(--danger); background: var(--danger-lt); }

  .btn-set-default {
    font-family: var(--sans);
    font-size: .72rem;
    padding: .2rem .55rem;
    background: none;
    border: 1px solid var(--border);
    border-radius: 99px;
    color: var(--muted);
    cursor: pointer;
    transition: color .15s, border-color .15s;
    white-space: nowrap;
  }
  .btn-set-default:hover { color: var(--accent); border-color: var(--accent); }

  .default-badge {
    display: inline-block;
    font-size: .72rem;
    font-weight: 500;
    padding: .15rem .55rem;
    border-radius: 99px;
    background: var(--accent-lt);
    color: var(--accent);
    white-space: nowrap;
  }

  .inline-input {
    font-family: var(--sans);
    font-size: .88rem;
    padding: .35rem .6rem;
    border: 1px solid var(--accent);
    border-radius: 6px;
    background: var(--surface);
    color: var(--text);
    outline: none;
    width: 100%;
    box-sizing: border-box;
  }
  .inline-input--short { width: 80px; }

  .inline-select {
    font-family: var(--sans);
    font-size: .84rem;
    padding: .35rem .6rem;
    border: 1px solid var(--accent);
    border-radius: 6px;
    background: var(--surface);
    color: var(--text);
    outline: none;
    -webkit-appearance: none;
    appearance: none;
  }

  .drag-handle {
    cursor: grab;
    color: var(--border);
    font-size: 1rem;
    padding: .65rem .4rem .65rem .2rem !important;
    user-select: none;
    transition: color .15s;
  }
  .drag-handle:hover { color: var(--muted); }
  tr.dragging  { opacity: .4; }
  tr.drag-over td { background: var(--accent-lt); }

  .cars-empty-state {
    text-align: center;
    padding: 2rem;
    color: var(--muted);
    font-size: .9rem;
  }
</style>

<div class="modal-backdrop" id="carsModalBackdrop">
  <div class="modal" role="dialog" aria-modal="true" aria-label="My Cars">

    <div class="modal-header">
      <h2>My Cars</h2>
      <button class="modal-close" id="carsModalClose" aria-label="Close">✕</button>
    </div>

    <div class="modal-body">
      <div id="cars-modal-flash"></div>

      <!-- Add car -->
      <form id="add-car-form">
        <div class="modal-add-row">
          <div class="form-field">
            <label for="new-name">Name</label>
            <input id="new-name" type="text" placeholder="e.g. 4Runner" required>
          </div>
          <div class="form-field">
            <label for="new-mpg">MPG</label>
            <input id="new-mpg" type="number" step="0.1" min="0" placeholder="25" required>
          </div>
          <div class="form-field">
            <label for="new-fuel">Fuel</label>
            <select id="new-fuel">
              <option value="gasoline">gasoline</option>
              <option value="diesel">diesel</option>
              <option value="hybrid">hybrid</option>
              <option value="electric">electric</option>
            </select>
          </div>
          <button type="submit" class="btn-add">Add</button>
        </div>
      </form>

      <!-- Cars table -->
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th style="width:1.5rem"></th>
              <th>Name</th>
              <th>MPG</th>
              <th>Fuel</th>
              <th>Default</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="cars-tbody">
            {% for car in user_cars %}
            <tr data-id="{{ car.id }}"
                data-name="{{ car.name }}"
                data-mpg="{{ car.mpg }}"
                data-fuel="{{ car.fuel_type }}"
                data-is-default="{{ 'true' if car.is_default else 'false' }}">
              <td class="drag-handle" title="Drag to reorder">⠿</td>
              <td class="car-name">{{ car.name }}</td>
              <td class="car-mpg mono">{{ car.mpg }}</td>
              <td class="car-fuel" style="color:var(--muted);font-size:.84rem">{{ car.fuel_type }}</td>
              <td>
                {% if car.is_default %}
                  <span class="default-badge">default</span>
                {% else %}
                  <button class="btn-set-default">Set default</button>
                {% endif %}
              </td>
              <td style="display:flex;gap:.4rem;justify-content:flex-end">
                <button class="btn-edit">Edit</button>
                <button class="btn-delete">Delete</button>
              </td>
            </tr>
            {% endfor %}
          </tbody>
        </table>
        <div class="cars-empty-state" id="cars-empty"{% if user_cars %} style="display:none"{% endif %}>
          No cars yet. Add one above.
        </div>
      </div>
    </div><!-- /.modal-body -->

  </div><!-- /.modal -->
</div><!-- /.modal-backdrop -->
